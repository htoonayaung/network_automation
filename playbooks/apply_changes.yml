---
- name: Apply configuration changes to network devices
  hosts: all
  gather_facts: no
  connection: network_cli

  vars:
    config_template: "{{ playbook_dir }}/templates/{{ ansible_network_os }}_changes.j2"

  tasks:
    - name: Check if config template exists for the device OS
      stat:
        path: "{{ config_template }}"
      register: template_stat
      delegate_to: localhost

    - name: Apply configuration changes for Cisco devices
      cisco.ios.ios_config:
        src: "{{ config_template }}"
      when: ansible_network_os == 'ios' and template_stat.stat.exists

    - name: Apply configuration changes for MikroTik devices
      community.routeros.api:
        src: "{{ config_template }}"
      when: ansible_network_os == 'community.routeros.routeros' and template_stat.stat.exists

    - name: Apply configuration changes for Huawei devices
      huawei.os.vrp_config:
        src: "{{ config_template }}"
      when: ansible_network_os == 'huawei.os.vrp' and template_stat.stat.exists

    - name: Apply configuration changes for H3C devices
      h3c.comware.comware_config:
        src: "{{ config_template }}"
      when: ansible_network_os == 'h3c.comware.comware' and template_stat.stat.exists

    - name: Apply configuration changes for ZTE devices
      zte.zxros.zxros_config:
        src: "{{ config_template }}"
      when: ansible_network_os == 'zte.zxros.zxros' and template_stat.stat.exists

    - name: Inform if no template found
      debug:
        msg: "No configuration template found for {{ ansible_network_os }} at {{ config_template }}. Skipping configuration application."
      when: not template_stat.stat.exists
